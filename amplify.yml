version: 1
backend:
  phases:
    build:
      commands:
        - nvm install --skip-default-packages 24
        - corepack enable
        - pnpm install --frozen-lockfile
        - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm install --skip-default-packages 24
        - corepack enable
        - pnpm install --frozen-lockfile
    build:
      commands:
        # 【調査用】OOM 原因特定のため、コンテナの実リソースを記録する
        - nproc; free -m; cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || true
        # 【調査用】1 秒間隔で cgroup メモリ使用量とプロセス別 RSS を記録しながらビルドする
        - (while sleep 1; do echo "[MON] memory.current=$( (cat /sys/fs/cgroup/memory.current 2>/dev/null || cat /sys/fs/cgroup/memory/memory.usage_in_bytes) 2>/dev/null)"; ps aux --sort=-rss | head -6; done) & MON=$!; pnpm run build; RC=$?; kill $MON 2>/dev/null || true; test "$RC" -eq 0
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
