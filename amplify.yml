version: 1
backend:
  phases:
    build:
      commands:
        - nvm install --skip-default-packages 24
        - corepack enable
        - pnpm install --frozen-lockfile
        - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm install --skip-default-packages 24
        - corepack enable
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
# 全レスポンスに付与するセキュリティヘッダー。
# CSP は最も壊れやすいため、デプロイ後に アップロード / ダウンロード / パスキー登録 /
# QR 表示 / ログインを実機確認し、ブラウザコンソールに違反が出たら該当ディレクティブを足す。
# connect-src は Cognito (idp / identity) と S3 (ap-northeast-1) を許可済み。
# 注意 (横展開時): このファイルは app.config.ts を参照できないため、環境固有値が
# ベタ書きになっている。別環境へ展開するときは connect-src のリージョンと
# form-action の認証ドメイン (auth.〜) を環境に合わせて書き換えること。
customHeaders:
  - pattern: "**"
    headers:
      - key: "Strict-Transport-Security"
        value: "max-age=63072000; includeSubDomains; preload"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "Referrer-Policy"
        value: "no-referrer"
      - key: "Permissions-Policy"
        value: "camera=(), microphone=(), geolocation=(), publickey-credentials-get=(self), publickey-credentials-create=(self)"
      - key: "Content-Security-Policy"
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://cognito-idp.ap-northeast-1.amazonaws.com https://cognito-identity.ap-northeast-1.amazonaws.com https://*.s3.ap-northeast-1.amazonaws.com https://s3.ap-northeast-1.amazonaws.com; worker-src 'self' blob:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://auth.storage-browser.www.non-97.net"
